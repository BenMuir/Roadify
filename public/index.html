<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadify | Claims Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0f1729',
                        brand: '#6366f1',
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen">

<div id="app"></div>

<script>
const API = window.location.origin;
let claims = [];
let currentView = 'list';
let currentClaimId = null;
let activeFilter = 'all';
let searchQuery = '';

async function fetchClaims() {
    try {
        const res = await fetch(`${API}/incidents`);
        claims = await res.json();
        render();
    } catch (err) {
        console.error('Failed to fetch claims:', err);
    }
}

function getClaim(id) {
    return claims.find(c => c.id === id);
}

function render() {
    const app = document.getElementById('app');
    if (currentView === 'detail' && currentClaimId) {
        app.innerHTML = renderDetail(getClaim(currentClaimId));
    } else {
        app.innerHTML = renderList();
    }
}

function openClaim(id) {
    currentView = 'detail';
    currentClaimId = id;
    render();
    window.scrollTo(0, 0);
}

function goBack() {
    currentView = 'list';
    currentClaimId = null;
    render();
}

function setFilter(f) {
    activeFilter = f;
    render();
}

function setSearch(q) {
    searchQuery = q.toLowerCase();
    render();
}

// --- Helpers ---
function severityBadge(sev, size = 'sm') {
    const s = (sev || 'pending').toLowerCase();
    const colors = {
        major: 'bg-red-100 text-red-700 ring-1 ring-red-200',
        medium: 'bg-amber-100 text-amber-700 ring-1 ring-amber-200',
        minor: 'bg-emerald-100 text-emerald-700 ring-1 ring-emerald-200',
        pending: 'bg-gray-100 text-gray-500 ring-1 ring-gray-200',
    };
    const cls = colors[s] || colors.pending;
    const px = size === 'lg' ? 'px-3 py-1.5 text-sm' : 'px-2.5 py-0.5 text-xs';
    return `<span class="${px} font-bold rounded-full uppercase tracking-wide ${cls}">${sev || 'Pending'}</span>`;
}

function timeAgo(dateStr) {
    if (!dateStr) return 'Unknown';
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    if (days === 1) return 'Yesterday';
    return `${days}d ago`;
}

function formatDate(dateStr) {
    if (!dateStr) return 'N/A';
    return new Date(dateStr).toLocaleString('en-AU', { dateStyle: 'medium', timeStyle: 'short' });
}

function getField(claim, nestedPath, flatKey) {
    const parts = nestedPath.split('.');
    let val = claim;
    for (const p of parts) { val = val?.[p]; }
    return val ?? claim?.[flatKey] ?? '';
}

function getDriverName(c) { return c.driver?.name || c.driverName || 'Unknown'; }
function getRego(c) { return c.claimantVehicle?.rego || c.vehicleRego || '—'; }
function getVehicleDesc(c) {
    const v = c.claimantVehicle || {};
    return [v.color || c.vehicleColor, v.make || c.vehicleMake, v.model || c.vehicleModel].filter(Boolean).join(' ') || 'Unknown vehicle';
}
function getIncidentType(c) { return c.incident?.type || c.incidentType || ''; }
function getDamage(c) { return c.damageDetections || []; }
function getPhotos(c) { return c.photos || []; }
function getContext(c) { return c.incidentContext || {}; }

function contextTags(c) {
    const ctx = getContext(c);
    const tags = [];
    if (ctx.thirdPartyInvolved === true) tags.push({ label: 'Third party', color: 'bg-blue-100 text-blue-700' });
    else if (ctx.thirdPartyInvolved === false) tags.push({ label: 'Single vehicle', color: 'bg-gray-100 text-gray-600' });
    if (ctx.hitAndRun) tags.push({ label: 'Hit & Run', color: 'bg-red-100 text-red-700' });
    if (ctx.parkedWhenHit) tags.push({ label: 'Parked', color: 'bg-purple-100 text-purple-700' });
    if (ctx.collisionObject) tags.push({ label: `Hit ${ctx.collisionObject}`, color: 'bg-gray-100 text-gray-600' });
    if (ctx.atFault === true) tags.push({ label: 'At fault', color: 'bg-red-50 text-red-600 ring-1 ring-red-200' });
    else if (ctx.atFault === false) tags.push({ label: 'Not at fault', color: 'bg-emerald-50 text-emerald-600 ring-1 ring-emerald-200' });
    return tags;
}

function incidentTypeLabel(type) {
    const map = { 'collision': 'Collision', 'hit-and-run': 'Hit & Run', 'rollover': 'Rollover', 'breakdown': 'Breakdown', 'weather-damage': 'Weather', 'other': 'Other' };
    return map[type] || type || 'Unknown';
}

// --- List View ---
function renderList() {
    let filtered = [...claims];

    if (activeFilter !== 'all') {
        filtered = filtered.filter(c => (c.severity || 'Pending').toLowerCase() === activeFilter);
    }

    if (searchQuery) {
        filtered = filtered.filter(c => {
            const haystack = [getDriverName(c), getRego(c), getVehicleDesc(c), getIncidentType(c), c.id].join(' ').toLowerCase();
            return haystack.includes(searchQuery);
        });
    }

    const counts = { all: claims.length, major: 0, medium: 0, minor: 0, pending: 0 };
    claims.forEach(c => { const s = (c.severity || 'pending').toLowerCase(); if (counts[s] !== undefined) counts[s]++; });

    const filterBtn = (key, label, color) => {
        const active = activeFilter === key;
        return `<button onclick="setFilter('${key}')" class="px-3.5 py-1.5 rounded-full text-xs font-semibold transition-all cursor-pointer ${active ? color : 'bg-white text-gray-500 hover:bg-gray-100 ring-1 ring-gray-200'}">${label} <span class="ml-1 opacity-60">${counts[key]}</span></button>`;
    };

    return `
    <div class="max-w-5xl mx-auto py-8 px-4">
        <div class="flex justify-between items-start mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Roadify <span class="text-brand">Claims</span></h1>
                <p class="text-gray-400 text-sm mt-1">Insurance claims triage dashboard</p>
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 bg-emerald-50 text-emerald-600 rounded-full text-xs font-bold">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                Live
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-2 mb-6">
            ${filterBtn('all', 'All', 'bg-gray-900 text-white')}
            ${filterBtn('major', 'Major', 'bg-red-600 text-white')}
            ${filterBtn('medium', 'Medium', 'bg-amber-500 text-white')}
            ${filterBtn('minor', 'Minor', 'bg-emerald-600 text-white')}
            ${filterBtn('pending', 'Pending', 'bg-gray-500 text-white')}
            <div class="flex-1"></div>
            <div class="relative">
                <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input type="text" placeholder="Search claims..." value="${searchQuery}" oninput="setSearch(this.value)" class="pl-9 pr-4 py-2 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent w-56" />
            </div>
        </div>

        <div class="space-y-3">
            ${filtered.length === 0 ? '<p class="text-center text-gray-400 py-12">No claims found</p>' : ''}
            ${filtered.map((c, i) => renderClaimCard(c, i)).join('')}
        </div>
    </div>`;
}

function renderClaimCard(c, index) {
    const sev = (c.severity || 'pending').toLowerCase();
    const borderColor = { major: 'border-l-red-500', medium: 'border-l-amber-400', minor: 'border-l-emerald-500', pending: 'border-l-gray-300' }[sev] || 'border-l-gray-300';
    const damage = getDamage(c);
    const photoCount = getPhotos(c).length;
    const tags = contextTags(c);
    const damagePreview = damage.slice(0, 3).map(d => d.class || d.label || '').join(', ');
    const extra = damage.length > 3 ? ` (+${damage.length - 3})` : '';

    return `
    <div onclick="openClaim('${c.id}')" class="fade-in bg-white rounded-xl border border-gray-200 border-l-4 ${borderColor} p-4 hover:shadow-md hover:border-gray-300 transition-all cursor-pointer" style="animation-delay: ${index * 40}ms">
        <div class="flex items-start justify-between gap-4">
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                    ${severityBadge(c.severity)}
                    <span class="font-bold text-sm text-gray-900 truncate">${getDriverName(c)}</span>
                    <span class="text-gray-400 text-xs font-mono">${getRego(c)}</span>
                </div>
                <p class="text-gray-500 text-sm">${getVehicleDesc(c)}</p>
                <div class="flex flex-wrap items-center gap-1.5 mt-2">
                    <span class="px-2 py-0.5 bg-gray-100 text-gray-600 text-xs rounded-full font-medium">${incidentTypeLabel(getIncidentType(c))}</span>
                    ${tags.map(t => `<span class="px-2 py-0.5 ${t.color} text-xs rounded-full font-medium">${t.label}</span>`).join('')}
                </div>
            </div>
            <div class="text-right shrink-0">
                <p class="text-xs text-gray-400">${timeAgo(c.createdAt)}</p>
                ${damage.length > 0 ? `<p class="text-xs text-gray-500 mt-1">${damage.length} detection${damage.length !== 1 ? 's' : ''}</p>` : ''}
                ${photoCount > 0 ? `<p class="text-xs text-gray-400 mt-0.5">${photoCount} photo${photoCount !== 1 ? 's' : ''}</p>` : ''}
            </div>
        </div>
        ${damagePreview ? `<p class="text-xs text-gray-400 mt-2 truncate">Damage: ${damagePreview}${extra}</p>` : ''}
    </div>`;
}

// --- Detail View ---
function renderDetail(c) {
    if (!c) return '<p class="p-8 text-gray-400">Claim not found</p>';

    const ctx = getContext(c);
    const damage = getDamage(c);
    const photos = getPhotos(c);
    const originals = photos.filter(p => p.type === 'original');
    const annotated = photos.filter(p => p.type === 'annotated');
    const tags = contextTags(c);
    const loc = c.incident?.location || c.location || {};
    const desc = c.incident?.description || c.description || '';
    const other = c.otherVehicle;
    const claimant = c.claimantVehicle || {};
    const driver = c.driver || {};
    const aiReport = c.aiReport || null;

    return `
    <div class="max-w-5xl mx-auto py-8 px-4 fade-in">
        <!-- Header -->
        <div class="mb-6">
            <button onclick="goBack()" class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-900 transition-colors cursor-pointer mb-4">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
                Back to Claims
            </button>
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <h1 class="text-xl font-bold text-gray-900">Claim ${(c.id || '').slice(0, 8).toUpperCase()}</h1>
                    ${severityBadge(c.severity, 'lg')}
                    <span class="px-2.5 py-1 bg-blue-50 text-blue-600 text-xs font-semibold rounded-full">${c.status || 'Submitted'}</span>
                    <span class="text-sm text-gray-400">${timeAgo(c.createdAt)}</span>
                </div>
                <div class="flex gap-2">
                    <button class="px-4 py-2 bg-emerald-600 text-white text-sm font-semibold rounded-lg hover:bg-emerald-700 transition-colors cursor-pointer">Approve</button>
                    <button class="px-4 py-2 bg-white text-gray-700 text-sm font-semibold rounded-lg ring-1 ring-gray-200 hover:bg-gray-50 transition-colors cursor-pointer">Request Info</button>
                    <button class="px-4 py-2 bg-white text-amber-600 text-sm font-semibold rounded-lg ring-1 ring-amber-200 hover:bg-amber-50 transition-colors cursor-pointer">Flag</button>
                    <button class="px-4 py-2 bg-white text-red-600 text-sm font-semibold rounded-lg ring-1 ring-red-200 hover:bg-red-50 transition-colors cursor-pointer">Escalate</button>
                </div>
            </div>
        </div>

        <!-- Two column layout -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-6">
            <!-- LEFT COLUMN -->
            <div class="space-y-4">
                <!-- Claimant Vehicle -->
                <div class="bg-white rounded-xl border border-gray-200 p-5">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Claimant Vehicle</h3>
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-brand/10 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12"/></svg>
                        </div>
                        <div>
                            <p class="font-semibold text-gray-900">${[claimant.color || c.vehicleColor, claimant.year || c.vehicleYear, claimant.make || c.vehicleMake, claimant.model || c.vehicleModel].filter(Boolean).join(' ')}</p>
                            <p class="text-sm text-gray-500 font-mono">${claimant.rego || c.vehicleRego || '—'}</p>
                        </div>
                    </div>
                </div>

                <!-- Other Vehicle -->
                ${ctx.thirdPartyInvolved ? `
                <div class="bg-white rounded-xl border border-gray-200 p-5">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Other Vehicle</h3>
                        ${ctx.hitAndRun ? '<span class="px-2 py-0.5 bg-red-100 text-red-700 text-xs font-bold rounded-full">Hit & Run</span>' : ''}
                    </div>
                    ${other && (other.rego || other.make) ? `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-red-50 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12"/></svg>
                        </div>
                        <div>
                            <p class="font-semibold text-gray-900">${[other.color, other.make, other.model].filter(Boolean).join(' ') || 'Unknown'}</p>
                            <p class="text-sm text-gray-500 font-mono">${other.rego || 'Plate unknown'}</p>
                        </div>
                    </div>
                    ` : `
                    <p class="text-sm text-gray-400 italic">${ctx.hitAndRun ? 'Other vehicle fled — no details captured' : 'No vehicle details available'}</p>
                    `}
                </div>
                ` : ctx.collisionObject ? `
                <div class="bg-white rounded-xl border border-gray-200 p-5">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Collision Object</h3>
                    <p class="font-semibold text-gray-900 capitalize">${ctx.collisionObject}</p>
                    <p class="text-sm text-gray-400">Single vehicle incident</p>
                </div>
                ` : ''}

                <!-- Incident Context -->
                <div class="bg-white rounded-xl border border-gray-200 p-5">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Incident Context</h3>
                    <div class="flex flex-wrap gap-2 mb-3">
                        <span class="px-2.5 py-1 bg-gray-100 text-gray-600 text-xs font-semibold rounded-full">${incidentTypeLabel(getIncidentType(c))}</span>
                        ${tags.map(t => `<span class="px-2.5 py-1 ${t.color} text-xs font-semibold rounded-full">${t.label}</span>`).join('')}
                    </div>
                    ${desc ? `<p class="text-sm text-gray-600 leading-relaxed">${desc}</p>` : ''}
                </div>

                <!-- Driver & Policy -->
                <div class="bg-white rounded-xl border border-gray-200 p-5">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Driver & Policy</h3>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between"><span class="text-gray-400">Name</span><span class="font-medium text-gray-900">${driver.name || c.driverName || '—'}</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Phone</span><span class="font-medium text-gray-900">${driver.phone || c.phone || '—'}</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Policy</span><span class="font-medium text-gray-900 font-mono">${driver.policyNumber || c.policyNumber || '—'}</span></div>
                    </div>
                </div>

                <!-- Location -->
                <div class="bg-white rounded-xl border border-gray-200 p-5">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Location & Time</h3>
                    <div class="space-y-2 text-sm">
                        ${loc.address ? `<div class="flex justify-between"><span class="text-gray-400">Address</span><span class="font-medium text-gray-900 text-right max-w-[65%]">${loc.address}</span></div>` : ''}
                        ${loc.lat ? `<div class="flex justify-between"><span class="text-gray-400">Coordinates</span><span class="font-mono text-gray-600">${Number(loc.lat).toFixed(5)}, ${Number(loc.lng).toFixed(5)}</span></div>` : ''}
                        <div class="flex justify-between"><span class="text-gray-400">Incident time</span><span class="font-medium text-gray-900">${formatDate(c.incident?.timestamp || c.timestamp)}</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Submitted</span><span class="font-medium text-gray-900">${formatDate(c.createdAt)}</span></div>
                        ${loc.lat ? `<a href="https://www.google.com/maps/search/?api=1&query=${loc.lat},${loc.lng}" target="_blank" class="inline-flex items-center gap-1 text-brand hover:text-brand/80 text-xs font-semibold mt-1">View on Map <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg></a>` : ''}
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="space-y-4">
                <!-- AI Report -->
                <div class="bg-white rounded-xl border border-gray-200 p-5">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">AI Incident Report</h3>
                        ${aiReport ? `<span class="px-2 py-0.5 bg-emerald-50 text-emerald-600 text-xs font-semibold rounded-full">Generated</span>` : `<span class="px-2 py-0.5 bg-amber-50 text-amber-600 text-xs font-semibold rounded-full">Pending</span>`}
                    </div>
                    ${aiReport ? `
                        <p class="text-sm text-gray-700 leading-relaxed mb-3">${aiReport.summary || ''}</p>
                        ${aiReport.findings?.length ? `
                        <ul class="space-y-1.5">
                            ${aiReport.findings.map(f => `<li class="flex items-start gap-2 text-sm text-gray-600"><svg class="w-4 h-4 text-brand shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>${f}</li>`).join('')}
                        </ul>` : ''}
                        ${aiReport.estimatedRepairClass ? `<p class="text-xs text-gray-400 mt-3">Estimated repair class: <span class="font-semibold text-gray-600">${aiReport.estimatedRepairClass}</span></p>` : ''}
                    ` : `
                        <div class="flex items-center gap-3 py-6">
                            <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">
                                <svg class="w-4 h-4 text-gray-400 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-gray-500">Report pending</p>
                                <p class="text-xs text-gray-400">AI analysis will appear here once generated</p>
                            </div>
                        </div>
                    `}
                </div>

                <!-- Damage Detections -->
                <div class="bg-white rounded-xl border border-gray-200 p-5">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Damage Detections</h3>
                    ${damage.length > 0 ? `
                    <div class="space-y-2.5">
                        ${damage.map(d => {
                            const conf = d.confidence || 0;
                            const barColor = conf >= 90 ? 'bg-red-500' : conf >= 75 ? 'bg-amber-500' : 'bg-gray-400';
                            return `
                            <div>
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-sm font-medium text-gray-700 capitalize">${(d.class || d.label || 'unknown').replace(/_/g, ' ')}</span>
                                    <span class="text-xs font-bold text-gray-400">${conf}%</span>
                                </div>
                                <div class="w-full bg-gray-100 rounded-full h-1.5">
                                    <div class="${barColor} h-1.5 rounded-full transition-all" style="width: ${conf}%"></div>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                    ` : '<p class="text-sm text-gray-400 italic py-2">No AI damage detections available</p>'}
                </div>
            </div>
        </div>

        <!-- Photos — full width -->
        ${photos.length > 0 ? `
        <div class="bg-white rounded-xl border border-gray-200 p-5 mb-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Evidence Photos</h3>
                <div class="flex rounded-lg overflow-hidden ring-1 ring-gray-200">
                    <button id="tab-original" onclick="switchPhotoTab('original')" class="px-3 py-1.5 text-xs font-semibold bg-gray-900 text-white cursor-pointer">Original</button>
                    <button id="tab-annotated" onclick="switchPhotoTab('annotated')" class="px-3 py-1.5 text-xs font-semibold bg-white text-gray-500 hover:bg-gray-50 cursor-pointer ${annotated.length === 0 ? 'opacity-40 cursor-not-allowed' : ''}">${annotated.length > 0 ? 'AI Annotated' : 'No Annotations'}</button>
                </div>
            </div>
            <div id="photos-original" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                ${originals.map(p => `
                <div class="relative group">
                    <div class="aspect-square rounded-lg bg-gray-100 border border-gray-200 overflow-hidden flex items-center justify-center">
                        <img src="${p.url || p.blobUrl}" alt="${p.slot}" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                        <div class="hidden flex-col items-center justify-center text-gray-400 absolute inset-0">
                            <svg class="w-8 h-8 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5"/></svg>
                            <span class="text-xs">No image</span>
                        </div>
                    </div>
                    <span class="absolute bottom-1.5 left-1.5 px-2 py-0.5 bg-black/60 text-white text-[10px] font-medium rounded capitalize backdrop-blur-sm">${p.slot}</span>
                </div>
                `).join('')}
            </div>
            <div id="photos-annotated" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 hidden">
                ${annotated.length > 0 ? annotated.map(p => `
                <div class="relative group">
                    <div class="aspect-square rounded-lg bg-gray-100 border-2 border-brand/20 overflow-hidden flex items-center justify-center">
                        <img src="${p.url || p.blobUrl}" alt="${p.slot} annotated" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                        <div class="hidden flex-col items-center justify-center text-gray-400 absolute inset-0">
                            <svg class="w-8 h-8 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5"/></svg>
                            <span class="text-xs">No image</span>
                        </div>
                    </div>
                    <span class="absolute bottom-1.5 left-1.5 px-2 py-0.5 bg-brand/80 text-white text-[10px] font-medium rounded capitalize backdrop-blur-sm">${p.slot} — AI</span>
                </div>
                `).join('') : '<p class="text-sm text-gray-400 italic col-span-full py-4 text-center">No annotated images available for this claim</p>'}
            </div>
        </div>
        ` : ''}
    </div>`;
}

function switchPhotoTab(tab) {
    const origEl = document.getElementById('photos-original');
    const annoEl = document.getElementById('photos-annotated');
    const tabOrig = document.getElementById('tab-original');
    const tabAnno = document.getElementById('tab-annotated');
    if (!origEl || !annoEl) return;

    if (tab === 'annotated') {
        origEl.classList.add('hidden');
        annoEl.classList.remove('hidden');
        tabOrig.className = tabOrig.className.replace('bg-gray-900 text-white', 'bg-white text-gray-500 hover:bg-gray-50');
        tabAnno.className = tabAnno.className.replace('bg-white text-gray-500 hover:bg-gray-50', 'bg-gray-900 text-white');
    } else {
        annoEl.classList.add('hidden');
        origEl.classList.remove('hidden');
        tabAnno.className = tabAnno.className.replace('bg-gray-900 text-white', 'bg-white text-gray-500 hover:bg-gray-50');
        tabOrig.className = tabOrig.className.replace('bg-white text-gray-500 hover:bg-gray-50', 'bg-gray-900 text-white');
    }
}

// Init
fetchClaims();
setInterval(fetchClaims, 15000);
</script>
</body>
</html>
