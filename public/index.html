<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadify | Internal Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-6xl mx-auto py-10 px-4">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Roadify <span class="text-blue-600">Admin</span></h1>
            <div id="status" class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium">Live Feed Active</div>
        </div>

        <div class="bg-white shadow-md rounded-lg overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Vehicle</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Severity</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Location</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Action</th>
                    </tr>
                </thead>
                <tbody id="incident-table" class="bg-white divide-y divide-gray-200">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchIncidents() {
            try {
                // Change this to your live Azure URL later!
                const response = await fetch('/incidents'); 
                const data = await response.json();
                const tableBody = document.getElementById('incident-table');
                tableBody.innerHTML = '';

                data.forEach(incident => {
                    const row = `
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${new Date(incident.createdAt).toLocaleDateString()}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${incident.vehicleRego}</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${getSeverityClass(incident.severity)}">
                                    ${incident.severity}
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${incident.location.lat.toFixed(2)}, ${incident.location.lng.toFixed(2)}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                <a href="https://www.google.com/maps/search/?api=1&query=${incident.location.lat},${incident.location.lng}" 
                                            target="_blank" 
                                            class="text-blue-600 hover:text-blue-900 font-bold underline">
                                            View Map
                                </a>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (err) {
                console.error("Dashboard error:", err);
            }
        }

        function getSeverityClass(severity) {
            switch(severity?.toLowerCase()) {
                case 'major': return 'bg-red-100 text-red-800';
                case 'medium': return 'bg-yellow-100 text-yellow-800';
                case 'minor': return 'bg-green-100 text-green-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        fetchIncidents();
        setInterval(fetchIncidents, 30000); // Refresh every 30 seconds
    </script>
</body>
</html>
