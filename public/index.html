<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadify | Claims Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0f1729',
                        'navy-light': '#1a2332',
                        brand: '#6366f1',
                        'brand-light': '#818cf8',
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        #lightbox { transition: opacity 0.2s; }
        .map-pulse {
            width: 18px; height: 18px; border-radius: 50%;
            background: #6366f1; border: 3px solid white;
            box-shadow: 0 0 0 0 rgba(99,102,241,0.5), 0 2px 8px rgba(0,0,0,0.3);
            animation: mapPulse 2s ease-out infinite;
        }
        @keyframes mapPulse { 0% { box-shadow: 0 0 0 0 rgba(99,102,241,0.5), 0 2px 8px rgba(0,0,0,0.3); } 70% { box-shadow: 0 0 0 12px rgba(99,102,241,0), 0 2px 8px rgba(0,0,0,0.3); } 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0), 0 2px 8px rgba(0,0,0,0.3); } }
        .leaflet-container { background: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen">

<div id="app"></div>
<div id="lightbox" class="fixed inset-0 bg-black/80 z-50 hidden items-center justify-center cursor-pointer" onclick="closeLightbox()">
    <img id="lightbox-img" class="max-w-[90vw] max-h-[90vh] rounded-lg shadow-2xl" />
</div>

<script>
const API = window.location.origin;
let claims = [];
let currentView = 'list';
let currentClaimId = null;
let activeFilter = 'all';
let searchQuery = '';
let selectedPhotoIndex = 0;
let photoViewMode = 'original';

async function fetchClaims() {
    try {
        const res = await fetch(`${API}/incidents`);
        claims = await res.json();
        claims.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        if (currentView === 'list') render();
    } catch (err) {
        console.error('Failed to fetch claims:', err);
    }
}

function getClaim(id) { return claims.find(c => c.id === id); }

function render() {
    const app = document.getElementById('app');
    if (currentView === 'detail' && currentClaimId) {
        app.innerHTML = renderDetail(getClaim(currentClaimId));
        initMap(getClaim(currentClaimId));
    } else {
        app.innerHTML = renderList();
    }
}

function openClaim(id) {
    currentView = 'detail';
    currentClaimId = id;
    selectedPhotoIndex = 0;
    photoViewMode = 'original';
    render();
    window.scrollTo(0, 0);
}

function goBack() {
    currentView = 'list';
    currentClaimId = null;
    render();
}

function setFilter(f) { activeFilter = f; render(); }
function setSearch(q) { searchQuery = q.toLowerCase(); render(); }

function getPhotoPool(c) {
    const photos = getPhotos(c);
    const originals = photos.filter(p => p.type === 'original');
    const annotated = photos.filter(p => p.type === 'annotated');
    return photoViewMode === 'annotated' && annotated.length > 0 ? annotated : originals;
}

function selectPhoto(index) {
    selectedPhotoIndex = index;
    const c = getClaim(currentClaimId);
    const pool = getPhotoPool(c);
    const photo = pool[index];
    if (photo) {
        const mainImg = document.getElementById('main-photo');
        const slotLabel = document.getElementById('photo-slot-label');
        if (mainImg) {
            mainImg.style.display = '';
            mainImg.src = photo.url || photo.blobUrl;
        }
        if (slotLabel) slotLabel.textContent = photo.slot + (photoViewMode === 'annotated' ? ' — AI' : '');
    }
    document.querySelectorAll('.photo-thumb').forEach((el, i) => {
        el.classList.toggle('ring-2', i === index);
        el.classList.toggle('ring-brand', i === index);
        el.classList.toggle('ring-offset-2', i === index);
        el.classList.toggle('opacity-50', i !== index);
        el.classList.toggle('opacity-100', i === index);
    });
}

function setPhotoMode(mode) {
    const c = getClaim(currentClaimId);
    const photos = getPhotos(c);
    const annotated = photos.filter(p => p.type === 'annotated');
    if (mode === 'annotated' && annotated.length === 0) return;

    photoViewMode = mode;
    selectedPhotoIndex = 0;
    const pool = getPhotoPool(c);

    // Update main image
    const mainImg = document.getElementById('main-photo');
    const slotLabel = document.getElementById('photo-slot-label');
    if (pool[0] && mainImg) {
        mainImg.style.display = '';
        mainImg.src = pool[0].url || pool[0].blobUrl;
    }
    if (slotLabel) slotLabel.textContent = (pool[0]?.slot || '') + (mode === 'annotated' ? ' — AI' : '');

    // Update thumbnails
    const strip = document.getElementById('thumb-strip');
    if (strip) {
        strip.innerHTML = pool.map((p, i) => `
            <div onclick="selectPhoto(${i})" class="photo-thumb shrink-0 w-20 h-20 rounded-lg overflow-hidden border-2 cursor-pointer transition-all ${i === 0 ? 'ring-2 ring-brand ring-offset-2 opacity-100' : 'border-gray-200 opacity-50 hover:opacity-80'}">
                <img src="${p.url || p.blobUrl}" alt="${p.slot}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<div class=\\'w-full h-full bg-gray-100 flex items-center justify-center text-gray-300 text-xs\\'>N/A</div>'" />
            </div>
        `).join('');
    }

    // Update toggle buttons
    const btnOrig = document.getElementById('btn-mode-original');
    const btnAnno = document.getElementById('btn-mode-annotated');
    if (btnOrig && btnAnno) {
        if (mode === 'original') {
            btnOrig.className = 'px-3 py-1 text-xs font-semibold cursor-pointer bg-gray-900 text-white';
            btnAnno.className = 'px-3 py-1 text-xs font-semibold cursor-pointer bg-white text-gray-500 hover:bg-gray-50';
        } else {
            btnOrig.className = 'px-3 py-1 text-xs font-semibold cursor-pointer bg-white text-gray-500 hover:bg-gray-50';
            btnAnno.className = 'px-3 py-1 text-xs font-semibold cursor-pointer bg-brand text-white';
        }
    }
}

function toggleDamage() {
    const panel = document.getElementById('damage-panel');
    const icon = document.getElementById('damage-chevron');
    if (!panel) return;
    const hidden = panel.classList.toggle('hidden');
    if (icon) icon.style.transform = hidden ? '' : 'rotate(180deg)';
}

function openLightbox(src) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = src;
    lb.classList.remove('hidden');
    lb.classList.add('flex');
}

function closeLightbox() {
    const lb = document.getElementById('lightbox');
    lb.classList.add('hidden');
    lb.classList.remove('flex');
}

function initMap(c) {
    const loc = c?.incident?.location || c?.location || {};
    const mapEl = document.getElementById('claim-map');
    if (!mapEl || !loc.lat || !loc.lng) return;
    const map = L.map('claim-map', { zoomControl: false, attributionControl: false, scrollWheelZoom: false }).setView([loc.lat, loc.lng], 15);
    L.tileLayer('https://basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png', {
        maxZoom: 19,
        attribution: '&copy; CARTO',
    }).addTo(map);
    const pulseIcon = L.divIcon({ className: '', html: '<div class="map-pulse"></div>', iconSize: [18, 18], iconAnchor: [9, 9] });
    L.marker([loc.lat, loc.lng], { icon: pulseIcon }).addTo(map);
    setTimeout(() => map.invalidateSize(), 150);
}

// --- Helpers ---
function severityBadge(sev, size = 'sm') {
    const s = (sev || 'pending').toLowerCase();
    const colors = {
        major: 'bg-red-100 text-red-700 ring-1 ring-red-200',
        medium: 'bg-amber-100 text-amber-700 ring-1 ring-amber-200',
        minor: 'bg-emerald-100 text-emerald-700 ring-1 ring-emerald-200',
        pending: 'bg-gray-100 text-gray-500 ring-1 ring-gray-200',
    };
    const cls = colors[s] || colors.pending;
    const px = size === 'lg' ? 'px-3 py-1 text-sm' : 'px-2.5 py-0.5 text-xs';
    return `<span class="${px} font-bold rounded-full uppercase tracking-wide ${cls}">${sev || 'Pending'}</span>`;
}

function timeAgo(dateStr) {
    if (!dateStr) return 'Unknown';
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    if (days === 1) return 'Yesterday';
    return `${days}d ago`;
}

function formatDate(dateStr) {
    if (!dateStr) return 'N/A';
    return new Date(dateStr).toLocaleString('en-AU', { dateStyle: 'medium', timeStyle: 'short' });
}

function getDriverName(c) { return c.driver?.name || c.driverName || 'Unknown'; }
function getRego(c) { return c.claimantVehicle?.rego || c.vehicleRego || '—'; }
function getVehicleDesc(c) {
    const v = c.claimantVehicle || {};
    return [v.color || c.vehicleColor, v.make || c.vehicleMake, v.model || c.vehicleModel].filter(Boolean).join(' ') || 'Unknown vehicle';
}
function getIncidentType(c) { return c.incident?.type || c.incidentType || ''; }
function getDamage(c) { return c.damageDetections || []; }
function getPhotos(c) { return c.photos || []; }
function getContext(c) { return c.incidentContext || {}; }

function contextTags(c) {
    const ctx = getContext(c);
    const tags = [];
    if (ctx.thirdPartyInvolved === true) tags.push({ label: 'Third party', color: 'bg-blue-100 text-blue-700' });
    else if (ctx.thirdPartyInvolved === false) tags.push({ label: 'Single vehicle', color: 'bg-gray-100 text-gray-600' });
    if (ctx.hitAndRun) tags.push({ label: 'Hit & Run', color: 'bg-red-100 text-red-700' });
    if (ctx.parkedWhenHit) tags.push({ label: 'Parked', color: 'bg-purple-100 text-purple-700' });
    if (ctx.collisionObject) tags.push({ label: `Hit ${ctx.collisionObject}`, color: 'bg-gray-100 text-gray-600' });
    if (ctx.atFault === true) tags.push({ label: 'At fault', color: 'bg-red-50 text-red-600 ring-1 ring-red-200' });
    else if (ctx.atFault === false) tags.push({ label: 'Not at fault', color: 'bg-emerald-50 text-emerald-600 ring-1 ring-emerald-200' });
    return tags;
}

function incidentTypeLabel(type) {
    const map = { 'collision': 'Collision', 'hit-and-run': 'Hit & Run', 'rollover': 'Rollover', 'breakdown': 'Breakdown', 'weather-damage': 'Weather', 'other': 'Other' };
    return map[type] || type || 'Unknown';
}

// --- List View ---
function renderList() {
    let filtered = [...claims];
    if (activeFilter !== 'all') {
        filtered = filtered.filter(c => (c.severity || 'Pending').toLowerCase() === activeFilter);
    }
    if (searchQuery) {
        filtered = filtered.filter(c => {
            const haystack = [getDriverName(c), getRego(c), getVehicleDesc(c), getIncidentType(c), c.id].join(' ').toLowerCase();
            return haystack.includes(searchQuery);
        });
    }

    const counts = { all: claims.length, major: 0, medium: 0, minor: 0, pending: 0 };
    claims.forEach(c => { const s = (c.severity || 'pending').toLowerCase(); if (counts[s] !== undefined) counts[s]++; });

    const filterBtn = (key, label, color) => {
        const active = activeFilter === key;
        return `<button onclick="setFilter('${key}')" class="px-3.5 py-1.5 rounded-full text-xs font-semibold transition-all cursor-pointer ${active ? color : 'bg-white text-gray-500 hover:bg-gray-100 ring-1 ring-gray-200'}">${label} <span class="ml-1 opacity-60">${counts[key]}</span></button>`;
    };

    return `
    <div class="max-w-6xl mx-auto py-8 px-6">
        <div class="flex justify-between items-start mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Roadify <span class="text-brand">Claims</span></h1>
                <p class="text-gray-400 text-sm mt-1">Insurance claims triage dashboard</p>
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 bg-emerald-50 text-emerald-600 rounded-full text-xs font-bold">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                Live
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-2 mb-6">
            ${filterBtn('all', 'All', 'bg-gray-900 text-white')}
            ${filterBtn('major', 'Major', 'bg-red-600 text-white')}
            ${filterBtn('medium', 'Medium', 'bg-amber-500 text-white')}
            ${filterBtn('minor', 'Minor', 'bg-emerald-600 text-white')}
            ${filterBtn('pending', 'Pending', 'bg-gray-500 text-white')}
            <div class="flex-1"></div>
            <div class="relative">
                <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input type="text" placeholder="Search claims..." value="${searchQuery}" oninput="setSearch(this.value)" class="pl-9 pr-4 py-2 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent w-56" />
            </div>
        </div>

        <div class="space-y-3">
            ${filtered.length === 0 ? '<p class="text-center text-gray-400 py-12">No claims found</p>' : ''}
            ${filtered.map((c, i) => renderClaimCard(c, i)).join('')}
        </div>
    </div>`;
}

function renderClaimCard(c, index) {
    const sev = (c.severity || 'pending').toLowerCase();
    const borderColor = { major: 'border-l-red-500', medium: 'border-l-amber-400', minor: 'border-l-emerald-500', pending: 'border-l-gray-300' }[sev] || 'border-l-gray-300';
    const damage = getDamage(c);
    const photoCount = getPhotos(c).length;
    const tags = contextTags(c);
    const damagePreview = damage.slice(0, 3).map(d => d.class || d.label || '').join(', ');
    const extra = damage.length > 3 ? ` (+${damage.length - 3})` : '';

    return `
    <div onclick="openClaim('${c.id}')" class="fade-in bg-white rounded-xl border border-gray-200 border-l-4 ${borderColor} p-4 hover:shadow-md hover:border-gray-300 transition-all cursor-pointer" style="animation-delay: ${index * 40}ms">
        <div class="flex items-start justify-between gap-4">
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                    ${severityBadge(c.severity)}
                    <span class="font-bold text-sm text-gray-900 truncate">${getDriverName(c)}</span>
                    <span class="text-gray-400 text-xs font-mono">${getRego(c)}</span>
                </div>
                <p class="text-gray-500 text-sm">${getVehicleDesc(c)}</p>
                <div class="flex flex-wrap items-center gap-1.5 mt-2">
                    <span class="px-2 py-0.5 bg-gray-100 text-gray-600 text-xs rounded-full font-medium">${incidentTypeLabel(getIncidentType(c))}</span>
                    ${tags.map(t => `<span class="px-2 py-0.5 ${t.color} text-xs rounded-full font-medium">${t.label}</span>`).join('')}
                </div>
            </div>
            <div class="text-right shrink-0">
                <p class="text-xs text-gray-400">${timeAgo(c.createdAt)}</p>
                ${damage.length > 0 ? `<p class="text-xs text-gray-500 mt-1">${damage.length} detection${damage.length !== 1 ? 's' : ''}</p>` : ''}
                ${photoCount > 0 ? `<p class="text-xs text-gray-400 mt-0.5">${photoCount} photo${photoCount !== 1 ? 's' : ''}</p>` : ''}
            </div>
        </div>
        ${damagePreview ? `<p class="text-xs text-gray-400 mt-2 truncate">Damage: ${damagePreview}${extra}</p>` : ''}
    </div>`;
}

// --- Detail View ---
function renderDetail(c) {
    if (!c) return '<p class="p-8 text-gray-400">Claim not found</p>';

    const ctx = getContext(c);
    const damage = getDamage(c);
    const photos = getPhotos(c);
    const originals = photos.filter(p => p.type === 'original');
    const annotated = photos.filter(p => p.type === 'annotated');
    const pool = getPhotoPool(c);
    const featured = pool[selectedPhotoIndex] || pool[0];
    const tags = contextTags(c);
    const loc = c.incident?.location || c.location || {};
    const desc = c.incident?.description || c.description || '';
    const other = c.otherVehicle;
    const claimant = c.claimantVehicle || {};
    const driver = c.driver || {};
    const aiReport = c.aiReport || null;
    const hasLocation = loc.lat && loc.lng;

    const infoRow = (label, value, mono = false) =>
        `<div class="flex justify-between py-1.5 border-b border-gray-50 last:border-0">
            <span class="text-gray-400 text-xs">${label}</span>
            <span class="text-xs font-medium text-gray-800 ${mono ? 'font-mono' : ''} text-right max-w-[60%] truncate">${value || '—'}</span>
        </div>`;

    return `
    <div class="max-w-[1400px] mx-auto py-6 px-6 fade-in">
        <!-- Header bar -->
        <div class="flex items-center justify-between mb-5">
            <div class="flex items-center gap-4">
                <button onclick="goBack()" class="w-9 h-9 rounded-lg bg-gray-100 hover:bg-gray-200 flex items-center justify-center cursor-pointer transition-colors">
                    <svg class="w-4 h-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
                </button>
                <div>
                    <div class="flex items-center gap-2.5">
                        <h1 class="text-lg font-bold text-gray-900">Claim ${(c.id || '').slice(0, 8).toUpperCase()}</h1>
                        ${severityBadge(c.severity, 'lg')}
                        <span class="px-2.5 py-0.5 bg-blue-50 text-blue-600 text-xs font-semibold rounded-full">${c.status || 'Submitted'}</span>
                    </div>
                    <p class="text-xs text-gray-400 mt-0.5">${getDriverName(c)} &middot; ${getRego(c)} &middot; ${timeAgo(c.createdAt)}</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button class="px-4 py-2 bg-emerald-600 text-white text-xs font-semibold rounded-lg hover:bg-emerald-700 transition-colors cursor-pointer">Approve</button>
                <button class="px-4 py-2 bg-white text-gray-600 text-xs font-semibold rounded-lg ring-1 ring-gray-200 hover:bg-gray-50 transition-colors cursor-pointer">Request Info</button>
                <button class="px-4 py-2 bg-white text-red-600 text-xs font-semibold rounded-lg ring-1 ring-red-200 hover:bg-red-50 transition-colors cursor-pointer">Escalate</button>
            </div>
        </div>

        <!-- Main grid -->
        <div class="grid grid-cols-12 gap-5">

            <!-- LEFT: Photos (col-span-7) -->
            <div class="col-span-12 lg:col-span-7 space-y-3">
                ${photos.length > 0 ? `
                <div class="flex items-center justify-between">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Evidence Photos</h3>
                    <div class="flex rounded-lg overflow-hidden ring-1 ring-gray-200">
                        <button id="btn-mode-original" onclick="setPhotoMode('original')" class="px-3 py-1 text-xs font-semibold cursor-pointer ${photoViewMode === 'original' ? 'bg-gray-900 text-white' : 'bg-white text-gray-500 hover:bg-gray-50'}">Original</button>
                        <button id="btn-mode-annotated" onclick="setPhotoMode('annotated')" class="px-3 py-1 text-xs font-semibold cursor-pointer ${annotated.length === 0 ? 'bg-gray-50 text-gray-300 cursor-not-allowed' : photoViewMode === 'annotated' ? 'bg-brand text-white' : 'bg-white text-gray-500 hover:bg-gray-50'}" ${annotated.length === 0 ? 'disabled' : ''}>AI Annotated</button>
                    </div>
                </div>

                <div class="bg-white rounded-xl border border-gray-200 overflow-hidden cursor-pointer" onclick="openLightbox(document.getElementById('main-photo')?.src)">
                    <div class="aspect-[16/10] bg-gray-100 flex items-center justify-center relative">
                        ${featured ? `
                        <img id="main-photo" src="${featured.url || featured.blobUrl}" alt="${featured.slot}" class="w-full h-full object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                        <div class="hidden flex-col items-center justify-center text-gray-400 absolute inset-0 bg-gray-100">
                            <svg class="w-12 h-12 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5"/></svg>
                            <span class="text-sm">Image unavailable</span>
                        </div>
                        <span id="photo-slot-label" class="absolute bottom-2 left-2 px-2.5 py-1 bg-black/60 text-white text-xs font-medium rounded-lg capitalize backdrop-blur-sm">${featured.slot}${photoViewMode === 'annotated' ? ' — AI' : ''}</span>
                        <span class="absolute bottom-2 right-2 px-2 py-1 bg-black/40 text-white/70 text-[10px] rounded-lg backdrop-blur-sm">Click to enlarge</span>
                        ` : `
                        <div class="text-gray-400 text-sm">No photos available</div>
                        `}
                    </div>
                </div>

                <div id="thumb-strip" class="flex gap-2 overflow-x-auto scrollbar-hide pb-1">
                    ${pool.map((p, i) => `
                    <div onclick="selectPhoto(${i})" class="photo-thumb shrink-0 w-20 h-20 rounded-lg overflow-hidden border-2 cursor-pointer transition-all ${i === selectedPhotoIndex ? 'ring-2 ring-brand ring-offset-2 opacity-100' : 'border-gray-200 opacity-50 hover:opacity-80'}">
                        <img src="${p.url || p.blobUrl}" alt="${p.slot}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<div class=\\'w-full h-full bg-gray-100 flex items-center justify-center text-gray-300 text-xs\\'>N/A</div>'" />
                    </div>
                    `).join('')}
                </div>
                ` : `
                <div class="bg-white rounded-xl border border-gray-200 p-8 text-center">
                    <svg class="w-12 h-12 text-gray-300 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5"/></svg>
                    <p class="text-sm text-gray-400">No photos submitted</p>
                </div>
                `}

                <!-- AI Report -->
                <div class="bg-white rounded-xl border border-gray-200 p-4">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">AI Incident Report</h3>
                        ${aiReport ? `<span class="px-2 py-0.5 bg-emerald-50 text-emerald-600 text-xs font-semibold rounded-full">Generated</span>` : `<span class="px-2 py-0.5 bg-amber-50 text-amber-600 text-xs font-semibold rounded-full">Pending</span>`}
                    </div>
                    ${aiReport ? `
                        <p class="text-sm text-gray-700 leading-relaxed mb-3">${aiReport.summary || ''}</p>
                        ${aiReport.findings?.length ? `
                        <ul class="space-y-1.5">
                            ${aiReport.findings.map(f => `<li class="flex items-start gap-2 text-sm text-gray-600"><svg class="w-4 h-4 text-brand shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>${f}</li>`).join('')}
                        </ul>` : ''}
                    ` : `
                        <div class="flex items-center gap-3 py-3">
                            <div class="w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center">
                                <svg class="w-3.5 h-3.5 text-gray-400 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg>
                            </div>
                            <p class="text-xs text-gray-400">AI analysis will appear here once generated</p>
                        </div>
                    `}
                </div>
            </div>

            <!-- RIGHT: Info panels (col-span-5) -->
            <div class="col-span-12 lg:col-span-5 space-y-3">

                <!-- Incident summary (top) -->
                <div class="bg-white rounded-xl border border-gray-200 p-4">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Incident Summary</h3>
                    <div class="flex flex-wrap gap-1.5 mb-3">
                        <span class="px-2.5 py-0.5 bg-gray-100 text-gray-700 text-xs font-semibold rounded-full">${incidentTypeLabel(getIncidentType(c))}</span>
                        ${tags.map(t => `<span class="px-2.5 py-0.5 ${t.color} text-xs font-semibold rounded-full">${t.label}</span>`).join('')}
                    </div>
                    ${desc ? `<p class="text-xs text-gray-600 leading-relaxed">${desc}</p>` : '<p class="text-xs text-gray-400 italic">No description available</p>'}
                </div>

                <!-- Map -->
                <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
                    ${hasLocation ? `
                    <div id="claim-map" class="w-full h-44"></div>
                    <div class="bg-navy px-4 py-2 flex items-center gap-2.5">
                        <svg class="w-4 h-4 text-brand-light shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                        </svg>
                        <div class="min-w-0 flex-1">
                            <p class="text-white text-xs font-medium truncate">${loc.address || 'Location found'}</p>
                            <p class="text-white/40 text-[10px] font-mono">${Number(loc.lat).toFixed(5)}, ${Number(loc.lng).toFixed(5)}</p>
                        </div>
                        <a href="https://www.google.com/maps/search/?api=1&query=${loc.lat},${loc.lng}" target="_blank" onclick="event.stopPropagation()" class="shrink-0 px-2.5 py-1.5 bg-white/10 hover:bg-white/20 text-white text-[10px] font-semibold rounded-lg flex items-center gap-1.5 transition-colors">
                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
                            Google Maps
                        </a>
                    </div>
                    ` : `
                    <div class="p-4">
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Location</h3>
                        <p class="text-xs text-gray-400 italic">No location data available</p>
                    </div>
                    `}
                </div>

                <!-- Vehicles side by side -->
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white rounded-xl border border-gray-200 p-3">
                        <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Claimant Vehicle</h3>
                        <p class="text-sm font-semibold text-gray-900">${[claimant.year || c.vehicleYear, claimant.make || c.vehicleMake, claimant.model || c.vehicleModel].filter(Boolean).join(' ') || '—'}</p>
                        <p class="text-xs text-gray-500">${claimant.color || c.vehicleColor || ''} &middot; <span class="font-mono">${claimant.rego || c.vehicleRego || '—'}</span></p>
                    </div>
                    <div class="bg-white rounded-xl border border-gray-200 p-3">
                        <div class="flex items-center justify-between mb-1.5">
                            <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">${ctx.thirdPartyInvolved ? 'Other Vehicle' : 'Object'}</h3>
                            ${ctx.hitAndRun ? '<span class="w-2 h-2 bg-red-500 rounded-full" title="Hit & Run"></span>' : ''}
                        </div>
                        ${ctx.thirdPartyInvolved && other && (other.rego || other.make) ? `
                            <p class="text-sm font-semibold text-gray-900">${[other.make, other.model].filter(Boolean).join(' ') || 'Unknown'}</p>
                            <p class="text-xs text-gray-500">${other.color || ''} &middot; <span class="font-mono">${other.rego || 'Unknown plate'}</span></p>
                        ` : ctx.collisionObject ? `
                            <p class="text-sm font-semibold text-gray-900 capitalize">${ctx.collisionObject}</p>
                            <p class="text-xs text-gray-400">Single vehicle</p>
                        ` : `
                            <p class="text-xs text-gray-400 italic">${ctx.hitAndRun ? 'Fled scene' : 'N/A'}</p>
                        `}
                    </div>
                </div>

                <!-- Policy Holder (compact) -->
                <div class="bg-white rounded-xl border border-gray-200 p-3">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2.5">
                            <div class="w-8 h-8 bg-gray-100 rounded-lg flex items-center justify-center">
                                <svg class="w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0"/></svg>
                            </div>
                            <div>
                                <p class="text-sm font-semibold text-gray-900">${driver.name || c.driverName || '—'}</p>
                                <p class="text-[10px] text-gray-400">${driver.phone || c.phone || '—'} &middot; <span class="font-mono">${driver.policyNumber || c.policyNumber || '—'}</span></p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-gray-400">${formatDate(c.incident?.timestamp || c.timestamp)}</p>
                        </div>
                    </div>
                </div>

                <!-- Damage Detections (collapsible) -->
                <div class="bg-white rounded-xl border border-gray-200">
                    <button onclick="toggleDamage()" class="w-full flex items-center justify-between p-4 cursor-pointer hover:bg-gray-50 rounded-xl transition-colors">
                        <div class="flex items-center gap-2.5">
                            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Damage Detections</h3>
                            ${damage.length > 0 ? `<span class="px-1.5 py-0.5 bg-gray-100 text-gray-500 text-[10px] font-bold rounded-full">${damage.length}</span>` : ''}
                        </div>
                        <svg id="damage-chevron" class="w-4 h-4 text-gray-400 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                    </button>
                    <div id="damage-panel" class="hidden px-4 pb-4">
                        ${damage.length > 0 ? `
                        <div class="space-y-2">
                            ${damage.map(d => {
                                const conf = d.confidence || 0;
                                const barColor = conf >= 90 ? 'bg-red-500' : conf >= 75 ? 'bg-amber-500' : 'bg-gray-400';
                                return `
                                <div class="flex items-center gap-3">
                                    <span class="text-xs font-medium text-gray-700 capitalize w-40 truncate">${(d.class || d.label || 'unknown').replace(/_/g, ' ')}</span>
                                    <div class="flex-1 bg-gray-100 rounded-full h-1.5">
                                        <div class="${barColor} h-1.5 rounded-full" style="width: ${conf}%"></div>
                                    </div>
                                    <span class="text-[10px] font-bold text-gray-400 w-8 text-right">${conf}%</span>
                                </div>`;
                            }).join('')}
                        </div>
                        ` : '<p class="text-xs text-gray-400 italic">No detections</p>'}
                    </div>
                </div>

            </div>
        </div>
    </div>`;
}

// Init
fetchClaims();
setInterval(fetchClaims, 30000);
</script>
</body>
</html>
